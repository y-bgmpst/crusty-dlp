# Copy to ~/.config/crusty-dlp/config.toml
output_dir = "/home/your-user/Downloads"
output_template = "%(title)s [%(id)s].%(ext)s"
# One of: video, audio, mp3, custom
default_mode = "video"
custom_format = "bestvideo+bestaudio/best"
# none, any, or an installed target such as chrome, firefox, safari, edge, tor
impersonation = "none"
# none, firefox, chrome, chromium, brave, vivaldi, edge
cookies_browser = "none"
# 1, 2, 4, 8, 12, or 16. Values above 8 may increase throttling/403 risk.
concurrent_fragments = 4
use_aria2 = false
# Empty means unlimited. Examples: 5M, 900K, 1.5Mi
rate_limit = ""
# Empty means auto. PMVHaven will default to 60 seconds if left blank.
socket_timeout = ""
# Empty means auto. PMVHaven will default to 10 retries if left blank.
retries = ""
# Empty means auto. PMVHaven will default to 10 fragment retries if left blank.
fragment_retries = ""
# Number of simultaneous downloads in the GUI.
max_active_downloads = 1
# Expand supported playlist URLs such as YouTube playlists.
allow_playlists = true
# Browser search launcher default platform.
search_platform = "youtube"
